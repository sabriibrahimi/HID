{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.css' %}">
</head>
<style>
    .poppins-light {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
}
</style>
<body>

        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}"><img src="{% static 'images/logo.png' %}" width="100px"
                                                                  height="50px"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">

                        <a class="nav-link active px-3" aria-current="page" href="#">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active px-3" aria-current="page" href="#">Contacts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active px-3 btn btn-outline-dark text-white rounded-0" aria-current="page" href="#">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
{% block content %}
{% endblock %}

</html>
