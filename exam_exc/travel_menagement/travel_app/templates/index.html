{% extends 'base.html' %}
{% load static %}

{% block content %}
    <div class="container text-center ">
        <h5 class="mt-5 text-secondary "> Top Selling </h5>
        <h1 class="mt-3 text-black">Top Destinations</h1>
    </div>
    <div class="container mt-4">
        <div class="row">
            {% for trip in trips %}
                <div class="col-4 d-flex justify-content-center ">
                    <div class="card shadow">
                        <img src="{{ trip.image.url }}" class="card-img-top" alt="">
                        <div class="card-body px-3 py-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title text-secondary fw-bold m-0">{{ trip.place }}</h5>
                                <span class="text-secondary fw-bold">${{ trip.price }}</span>
                            </div>
                            <div class="d-flex align-items-center text-secondary small">
                                {{ trip.duration }} Days Trip
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
            <div class="text-center mt-4">
                <a href="{% url 'add' %}" class="btn btn-outline-dark">
                    Add a trip
                </a>
            </div>
        </div>
    </div>
{% endblock %}
